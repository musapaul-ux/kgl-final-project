<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Branch Sales Dashboard | Karibu Groceries</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f6f9;
}

/* Layout */
.wrapper {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 240px;
    height: 100vh;
    background: #0d6efd;
    color: white;
    padding-top: 20px;
    position: fixed;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    padding: 15px 20px;
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #084298;
}

.logout {
    position: absolute;
    bottom: 20px;
    width: 100%;
}

/* Main Content */
.main {
    margin-left: 240px;
    padding: 30px;
    width: 100%;
}

.topbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
}

.card-container {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.05);
}

.card h3 {
    margin: 0;
    color: #555;
}

.card h2 {
    margin-top: 10px;
    color: #0d6efd;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-align: left;
}

th {
    background: #0d6efd;
    color: white;
}

</style>
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Karibu</h2>

        <a href="add_cash_sale.html">➕ Add Cash Sale</a>
        <a href="add_credit_sale.html">➕ Add Credit Sale</a>
        <!-- <a href="sales_agent_dashboard.html">📊 View Branch Sales</a> -->

        <div class="logout">
            <button class="logout-btn" id="logout-btn">Logout</button>
            <!-- <a href="#" onclick="logout()">🚪 Logout</a> -->
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="topbar">
            <h2>Branch Sales Dashboard</h2>
            <span id="branchInfo"></span>
        </div>

        <!-- Summary Cards -->
        <div class="card-container">
            <div class="card">
                <h3>Total Cash Sales</h3>
                <h2 id="cashTotal">0</h2>
            </div>

            <div class="card">
                <h3>Total Credit Sales</h3>
                <h2 id="creditTotal">0</h2>
            </div>

            <div class="card">
                <h3>Total Branch Sales</h3>
                <h2 id="grandTotal">0</h2>
            </div>
        </div>

        <!-- Sales Table -->
        <h3>All Sales in Your Branch</h3>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Agent</th>
                    <th>Type</th>
                    <th>Product</th>
                    <th>Tonnage</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="salesTable"></tbody>
        </table>

    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/sales_agent_dashboard.js"></script>

</body>
</html>
