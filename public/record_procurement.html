<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Procurement - KGL</title>
   <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  <link rel="stylesheet" href="../css/style.css" />

  <style>
    /* ================= GLOBAL RESET ================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background-color: #f4f7fb;
    }

    /* ================= LAYOUT ================= */
    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #0a3d62, #082c45);
      color: white;
      position: fixed;
      /* 🔥 Important */
      left: 0;
      top: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-bottom: 20px;
    }

    .sidebar h2 {
      margin: 20px 0;
      text-align: center;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .sidebar nav {
      display: flex;
      flex-direction: column;
      padding: 0 15px;
    }

    .sidebar nav a {
      color: white;
      text-decoration: none;
      padding: 12px 15px;
      border-radius: 6px;
      margin-bottom: 8px;
      transition: 0.3s;
      font-size: 14px;
    }

    .sidebar nav a:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .sidebar nav a.active {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Logout button */
    .logout-btn {
      margin: 0 15px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background-color: #d63384;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .logout-btn:hover {
      background-color: #b02a6b;
    }

    /* ================= MAIN CONTENT ================= */
    .main-content {
      margin-left: 240px;
      /* 🔥 Push content right */
      padding: 40px;
      flex: 1;
    }

    .dashboard-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    }

    .dashboard-container h1 {
      margin-bottom: 10px;
      color: #0a3d62;
    }

    #procurementMessage {
      margin-bottom: 20px;
      font-weight: 500;
    }

    /* ================= FORM ================= */
    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 500;
      color: #333;
    }

    .form-group input,
    .form-group select {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      transition: 0.3s;
      font-size: 14px;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #d63384;
      outline: none;
      box-shadow: 0 0 0 2px rgba(214, 51, 132, 0.15);
    }

    .btn-primary {
      grid-column: span 2;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: #0a3d62;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background-color: #d63384;
    }

    /* ================= RESPONSIVE ================= */
    @media (max-width: 992px) {
      form {
        grid-template-columns: 1fr;
      }

      .btn-primary {
        grid-column: span 1;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        position: relative;
        width: 100%;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 10px 15px;
      }

      .sidebar nav {
        flex-direction: row;
        overflow-x: auto;
      }

      .sidebar nav a {
        margin-right: 10px;
        margin-bottom: 0;
        white-space: nowrap;
      }

      .main-content {
        margin-left: 0;
        padding: 20px;
      }
    }
  </style>
</head>

<body class="dashboard">
    <div class="dashboard-wrapper">
      <div class="sidebar">
    <h2 style="color: white; margin: 20px 0; text-align: center; font-size: 16px;">KGL SYSTEM</h2>
    <nav>
      <a href="add_user.html" style="display: block;">📊 Add User</a>
      <a href="manager_dashboard.html" style="display: block; background: rgba(255, 255, 255, 0.2);">📦 View
        Procurements</a>
      <a href="record_procurement.html" style="display: block;">➕ Record Procurement</a>
      <a href="stock.html" style="display: block;">📦 View Stock</a>
      <a href="sales_list.html" style="display: block;">💰 Sales</a>
      <a href="users_list.html" style="display: block;">👥 Users</a>
    </nav>
    <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
  </div>

  <div class="main-content">
    <div class="dashboard-container">
      <h1>Record New Procurement</h1>
      <p id="procurementMessage"></p>

      <!-- Your form remains unchanged -->
      <!-- (I kept your structure intact) -->
      <section id="recordProcurementSection">
        <form id="procurementForm">
          <div class="form-group">
            <label for="produceName">Produce Name:</label>
            <select id="produceName" required>
              <option value="">-- Select Produce --</option>
              <option value="Beans">Beans</option>
              <option value="Grain Maize">Grain Maize</option>
              <option value="Cow peas">Cow peas</option>
              <option value="G-nuts">G-nuts</option>
              <option value="Soybeans">Soybeans</option>
            </select>
          </div>
          <div class="form-group">
            <label for="produceType">Produce Type:</label>
            <select id="produceType" required>
              <option value="">-- Select Produce Type --</option>
              <option value="Fresh">Fresh</option>
              <option value="Dried">Dried</option>
            </select>
          </div>

          <div class="form-group">
            <label for="supplierType">Supplier Type:</label>
            <select id="supplierType" required onchange="updateSupplierNameOptions()">
              <option value="">-- Select Supplier Type --</option>
              <option value="Individual">Individual Dealer</option>
              <option value="Company">Company</option>
              <option value="Farm">Farm</option>
            </select>
          </div>

          <div class="form-group">
            <label for="supplierName">Supplier Name:</label>
            <input type="text" id="supplierName" placeholder="e.g., John Doe or Farm Name" required />
          </div>

          <div class="form-group">
            <label for="branchName">Branch:</label>
            <select id="branchName" required>
              <option value="">-- Select Branch --</option>
              <option value="Maganjo">Maganjo</option>
              <option value="Matugga">Matugga</option>
            </select>
          </div>

          <div class="form-group">
            <label for="tonnageKgs">Tonnage (kg):</label>
            <input type="number" id="tonnageKgs" placeholder="e.g., 1500" step="0.1" required />
          </div>

          <div class="form-group">
            <label for="costUgx">Cost (UGX):</label>
            <input type="number" id="costUgx" placeholder="e.g., 5000000" required />
          </div>

          <div class="form-group">
            <label for="PriceToBeSoldAt">Price to be Sold At (per kg/unit in UGX):</label>
            <input type="number" id="PriceToBeSoldAt" placeholder="e.g., 5000" step="0.01" required />
          </div>

          <div class="form-group">
            <label for="contact">Supplier Contact:</label>
            <input type="text" id="contact" placeholder="e.g., +256700123456" required />
          </div>

          <div class="form-group">
            <label for="date">Date:</label>
            <input type="date" id="date" required />
          </div>

          <div class="form-group">
            <label for="time">Time:</label>
            <input type="time" id="time" required />
          </div>

          <button type="submit" class="btn-primary">
            Record Procurement
          </button>
        </form>
      </section>
    </div>
  </div>

  </div>
  </div>
    </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/record_procurement.js"></script>

</body>

</html>
