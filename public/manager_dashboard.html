<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Procurements - KGL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="dashboard">
    <div class="dashboard-wrapper">
      <div class="sidebar">
        <h2 style="color: white; margin: 20px 0; text-align: center; font-size: 16px;">KGL SYSTEM</h2>
        <nav>
          <a href="add_user.html" style="display: block;">📊 Add User</a>
          <a href="manager_dashboard.html" style="display: block; background: rgba(255, 255, 255, 0.2);">📦 View Procurements</a>
          <a href="record_procurement.html" style="display: block;">➕ Record Procurement</a>
          <a href="stock.html" style="display: block;">📦 View Stock</a>
          <a href="sales_list.html" style="display: block;">💰 Sales</a>
          <a href="users_list.html" style="display: block;">👥 Users</a>
        </nav>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
      </div>
      <div class="main-content">
        <div class="dashboard-container">
          <h1>Procurement Records</h1>
          <p>All procurements recorded in the system.</p>

          <!-- procurements table section -->
          <section id="procurementsTableSection" style="margin-top: 25px">
            <table class="records-table">
              <thead>
                <tr>
                  <th>Date (M/D/YYYY)</th>
                  <th>Produce</th>
                  <th>Supplier</th>
                  <th>Supplier Type</th>
                  <th>Tonnage (kg)</th>
                  <th>Branch</th>
                  <th>Cost (UGX)</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="procurementsTableBody">
                <tr>
                  <td colspan="8" style="text-align: center">Loading...</td>
                </tr>
              </tbody>
            </table>
          </section>

          <p
            id="procurementMessage"
            class="error-message"
            style="margin-top: 20px"
          ></p>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/manager_dashboard.js"></script>
  </body>
</html>
