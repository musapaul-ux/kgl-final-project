<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Director Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f6f9;
        }


        /* TOPBAR */

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background:#0b3d2e;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 1000;
        }

        .topbar p {
            font-size: 16px;
        }

        .logoutbtn {
            background: tomato;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 5px;
            cursor: pointer;
        }

        .logoutbtn:hover {
            background: #e04a3b;
        }


        /* MAIN CONTAINER */

        .container {
            margin-top: 90px;
            padding: 30px;
        }


        /* SUMMARY CARDS */

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card h4 {
            color: #555;
            font-weight: 600;
        }

        .card p {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
            color: #191980;
        }


        /* CHARTS */

        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .chartBox {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .chartBox h3 {
            margin-bottom: 15px;
            color: #333;
        }


        /* TABLE */

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        thead {
            background: #0b3d2e;
            color: white;
        }

        th,
        td {
            padding: 14px;
            text-align: left;
        }

        tbody tr:nth-child(even) {
            background: #f7f9fc;
        }

        tbody tr:hover {
            background: #eef2ff;
        }

        th {
            font-weight: 600;
        }
    </style>

</head>

<body>


    <!-- TOPBAR -->

    <div class="topbar">
        <p>Welcome, Director! Business Performance Overview</p>
        <button class="logoutbtn">Logout</button>
    </div>



    <div class="container">

        <!-- SUMMARY CARDS -->

        <div class="cards">

            <div class="card">
                <h4>Total Stock</h4>
                <p id="stock">0</p>
            </div>

            <div class="card">
                <h4>Total Revenue</h4>
                <p id="revenue">0</p>
            </div>

            <div class="card">
                <h4>Outstanding Credit</h4>
                <p id="credit">0</p>
            </div>

        </div>



        <!-- CHARTS -->

        <div class="charts">

            <div class="chartBox">
                <h3>Sales Per Branch</h3>
                <canvas id="branchChart"></canvas>
            </div>

            <div class="chartBox">
                <h3>Monthly Sales Trend</h3>
                <canvas id="monthlyChart"></canvas>
            </div>

        </div>



        <!-- TABLE -->

        <h3 style="margin-bottom:10px;">Branch Performance</h3>

        <table>

            <thead>
                <tr>
                    <th>Branch</th>
                    <th>Quantity Sold (Kg)</th>
                    <th>Total Revenue (Ugx)</th>
                </tr>
            </thead>

            <tbody id="branchTable">

            </tbody>

        </table>

    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/director_dashboard.js"></script>

</body>

</html>
