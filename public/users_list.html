<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Procurements - KGL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />

    <style>
      /* MODAL BACKGROUND */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
      }

      /* MODAL BOX */
      .modal-content {
        background: white;
        width: 400px;
        margin: 8% auto;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      /* CLOSE BUTTON */
      .closeBtn {
        float: right;
        font-size: 25px;
        cursor: pointer;
      }

      /* FORM GROUP */
      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      /* BUTTONS */
      .form-buttons {
        display: flex;
        justify-content: space-between;
      }

      .saveBtn {
        background: green;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
      }

      .cancelBtn {
        background: #d63384;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body class="dashboard">
    <div class="dashboard-wrapper">
      <div class="sidebar">
        <h2
          style="
            color: white;
            margin: 20px 0;
            text-align: center;
            font-size: 16px;
          "
        >
          KGL SYSTEM
        </h2>
        <nav>
          <a href="add_user.html" style="display: block">📊 Add User</a>
          <a
            href="manager_dashboard.html"
            style="display: block; background: rgba(255, 255, 255, 0.2)"
            >📦 View Procurements</a
          >
          <a href="record_procurement.html" style="display: block"
            >➕ Record Procurement</a
          >
          <a href="sales_dashboard.html" style="display: block">💰 Sales</a>
          <a href="users_list.html" style="display: block">👥 Users</a>
        </nav>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
      </div>
      <div class="main-content">
        <div class="dashboard-container">
          <h1>System Users</h1>
          <p>All users recorded in the system.</p>

          <!-- procurements table section -->
          <section id="userTableSection" style="margin-top: 25px">
            <table class="records-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Branch</th>
                  <th colspan="2">Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr>
                  <td colspan="8" style="text-align: center">Loading...</td>
                </tr>
              </tbody>
            </table>
          </section>

          <p
            id="userMessage"
            class="error-message"
            style="margin-top: 20px"
          ></p>
        </div>
      </div>
    </div>

    <!-- EDIT USER MODAL -->
    <div id="editUserModal" class="modal">
      <div class="modal-content">
        <span class="closeBtn">&times;</span>

        <h2>Edit User</h2>

        <input type="hidden" id="editUserId" />

        <div class="form-group">
          <label>Name</label>
          <input type="text" id="editName" placeholder="Enter name" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="editEmail" placeholder="Enter email" />
        </div>

        <div class="form-group">
          <label>Role</label>
          <select id="editRole">
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
            <option value="sales">Sales Agent</option>
          </select>
        </div>

        <div class="form-group">
          <label>Branch</label>
          <input type="text" id="editBranch" placeholder="Enter branch" />
        </div>

        <div class="form-buttons">
          <button  class="saveBtn">Save Changes</button>
          <button  class="cancelBtn">Cancel</button>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/users_list.js"></script>
  </body>
</html>
