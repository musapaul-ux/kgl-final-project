<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record Cash Sale - KGL</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    background: #f4f7fb;
    padding: 40px;
}

.container {
    max-width: 1000px;
    margin: auto;
    background: white;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
    margin-bottom: 20px;
    color: #0a3d62;
}

form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 6px;
    font-weight: 500;
}

input, select {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ddd;
}

input:focus, select:focus {
    outline: none;
    border-color: #d63384;
}

.stock-info {
    font-size: 13px;
    color: #0a3d62;
    margin-top: 5px;
}

.total-box {
    grid-column: span 2;
    padding: 15px;
    background: #f0f4ff;
    border-radius: 8px;
    font-weight: 600;
}

button {
    grid-column: span 2;
    padding: 12px;
    background: #0a3d62;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #d63384;
}

@media (max-width: 768px) {
    form {
        grid-template-columns: 1fr;
    }

    .total-box,
    button {
        grid-column: span 1;
    }
}
</style>
</head>
<body>

<div class="container">
<h1>Record Cash Sale</h1>

<form id="cashForm">

    <div class="form-group">
        <label>Branch</label>
        <input type="text" id="branchName" disabled>
    </div>

    <div class="form-group">
        <label>Sales Agent</label>
        <input type="text" id="agentName" disabled>
    </div>

    <div class="form-group">
        <label>Produce</label>
        <select id="produceSelect" required></select>
        <div class="stock-info" id="stockInfo"></div>
    </div>

    <div class="form-group">
        <label>Tonnage (Kg)</label>
        <input type="number" id="tonnageKgs" step="0.1" required>
    </div>

    <div class="form-group">
        <label>Buyer Name</label>
        <input type="text" id="buyerName" required>
    </div>

    <div class="form-group">
        <label>Date</label>
        <input type="date" id="date" required>
    </div>

    <div class="total-box">
        Total Amount: UGX <span id="totalAmount">0</span>
    </div>

    <button type="submit">Complete Sale</button>

</form>
</div>

</body>
</html>
