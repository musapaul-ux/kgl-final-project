<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manager Panel - KGL</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="dashboard">
    <div class="dashboard-wrapper">
    <div class="sidebar">
      <h2 style="text-align: center; color: white; margin: 20px 0; font-size: 16px;">KGL SYSTEM</h2>
      <nav>
        <a href="add_user.html" style="display: block;">📊 Add User</a>
        <a href="manager_dashboard.html" style="display: block;">📦 View Procurements</a>
        <a href="record_procurement.html" style="display: block;">➕ Record Procurement</a>
        <a href="sales_list.html" style="display: block;">💰 Sales</a>
        <a href="users_list.html" style="display: block;">👥 Users</a>
      </nav>
      <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
    </div>
    <div class="main-content">
      <div class="dashboard-container">
        <h1>Manager Panel</h1>
      <p>Welcome, manager. Use the sections below to administer the system.</p>

      <!-- create user section -->
      <section id="createUserSection">
        <h2>Create user</h2>
        <form id="createUserForm">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="userName" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="userEmail" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="userPassword" required />
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="userRole">
                <option value="">--Select Role--</option>
              <option value="Manager">Manager</option>
              <option value="SalesAgent">Sales Agent</option>
              <option value="Director">Director</option>
            </select>
          </div>
          <div class="form-group">
            <label>Branch</label>
            <select id="userBranch">
                <option value="">--Select Branch--</option>
              <option value="Maganjo">Maganjo</option>
              <option value="Matugga">Matugga</option>
            </select>
          </div>
          <button type="submit" class="login-btn">Create</button>
        </form>
        <p id="userMessage" class="error-message"></p>
      </section>

      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/manager.js"></script>
  </body>
</html>
