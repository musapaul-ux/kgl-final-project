<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Procurements - KGL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .btn{
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .cashSaleBtn, .creditSaleBtn, .viewcreditBtn {
            padding: 10px 15px;
            margin-right: 10px;
            background-color: #198754;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    
        .cashSaleBtn a, .creditSaleBtn a, .viewcreditBtn a {
            color: white;
            text-decoration: none;
        }   
    </style>
  </head>
  <body class="dashboard">
    <div class="dashboard-wrapper">
      <div class="sidebar">
        <h2 style="color: white; margin: 20px 0; text-align: center; font-size: 16px;">KGL SYSTEM</h2>
        <nav>
          <a href="add_user.html" style="display: block;">📊 Add User</a>
          <a href="manager_dashboard.html" style="display: block; background: rgba(255, 255, 255, 0.2);">📦 View Procurements</a>
          <a href="record_procurement.html" style="display: block;">➕ Record Procurement</a>
          <a href="sales_list.html" style="display: block;">💰 Sales</a>
          <a href="users_list.html" style="display: block;">👥 Users</a>
        </nav>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
      </div>
      <div class="main-content">
        <div class="btn">
            <button class="cashSaleBtn"><a href="add_cash_sale.html">+ Cash Sale</a></button>
            <button class="creditSaleBtn"><a href="add_credit_sale.html">+ Credit Sale</a></button>
            <button class="viewcreditBtn"><a href="credit_list.html">View Credit Sales</a></button>
        </div>
        <div class="dashboard-container">
          <h1>Cash Sale Records</h1>
          <p>All cash sales recorded in the system.</p>

          <!-- sales table section -->
          <section id="salesTableSection" style="margin-top: 25px">
            <table class="records-table">
              <thead>
                <tr>
                  <th>Date (M/D/YYYY)</th>
                  <th>Produce</th>
                  <th>Sales Agent</th>
                  <th>Buyer</th>
                  <th>Tonnage (kg)</th>
                  <th>Branch</th>
                  <th>Cost (UGX)</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="salesTableBody">
                <tr>
                  <td colspan="8" style="text-align: center">Loading...</td>
                </tr>
              </tbody>
            </table>
          </section>

          <p
            id="salesMessage"
            class="error-message"
            style="margin-top: 20px"
          ></p>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sales_list.js"></script>
  </body>
</html>
