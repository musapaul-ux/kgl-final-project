<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Record Credit Sale - KGL</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background-color: #f4f7fb;
      }

      /* ===== Layout ===== */
      .wrapper {
        display: flex;
      }

      /* ===== Sidebar ===== */
      .sidebar {
        width: 240px;
        height: 100vh;
        background: linear-gradient(180deg, #0d6efd, #084298);
        color: white;
        padding-top: 25px;
        position: fixed;
        display: flex;
        flex-direction: column;
      }

      .sidebar h2 {
        text-align: center;
        margin-bottom: 40px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      .sidebar a {
        display: block;
        padding: 14px 25px;
        color: white;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s;
      }

      .sidebar a:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .logout {
        margin-top: auto;
        margin-bottom: 20px;
      }

      /* ===== Main Content ===== */
      .main {
        margin-left: 240px;
        width: 100%;
        padding: 40px;
      }

      /* ===== Top Header ===== */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      .header h1 {
        color: #0a3d62;
        font-size: 24px;
      }

      .message {
        font-weight: 500;
        margin-bottom: 20px;
      }

      /* ===== Form Card ===== */
      .container {
        background: white;
        padding: 35px;
        border-radius: 14px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
      }

      /* ===== Form Layout ===== */
      form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      label {
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      input,
      select {
        padding: 11px;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 14px;
        transition: 0.3s;
        background-color: #f9fafc;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #0d6efd;
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
      }

      /* ===== Button ===== */
      button {
        grid-column: span 2;
        padding: 14px;
        background: linear-gradient(90deg, #0d6efd, #0a3d62);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
      }

      /* ===== Responsive ===== */
      @media (max-width: 992px) {
        form {
          grid-template-columns: 1fr;
        }

        button {
          grid-column: span 1;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <!-- Sidebar -->
      <div class="sidebar">
        <h2>Karibu Grocceries Ltd</h2>

        <a href="add_cash_sale.html">➕ Add Cash Sale</a>
        <!-- <a href="add_credit_sale.html">➕ Add Credit Sale</a> -->
        <a href="sales_agent_dashboard.html">📊 View Branch Sales</a>

        <div class="logout">
            <button class="logout-btn" id="logout-btn">Logout</button>
          <!-- <a href="#" onclick="logout()">🚪 Logout</a> -->
        </div>
      </div>

      <!-- Main Content -->
      <div class="main">
        <div class="header">
          <h1>Record Credit Sale</h1>
        </div>

        <div class="container">
          <p id="message" class="message"></p>

          <form id="creditForm">
            <div class="form-group">
              <label>Buyer Name</label>
              <input type="text" id="buyerName" required />
            </div>

            <div class="form-group">
              <label>National ID</label>
              <input type="text" id="nationalId" required />
            </div>

            <div class="form-group">
              <label>Location</label>
              <input type="text" id="location" required />
            </div>

            <div class="form-group">
              <label>Contact</label>
              <input type="text" id="contact" required />
            </div>

            <div class="form-group">
              <label>Produce Name</label>
              <select id="produceName" required>
                <option value="">Select Produce</option>
                <option value="Beans">Beans</option>
                <option value="Grain Maize">Maize</option>
                <option value="Soy beans">Rice</option>
                <option value="G-nuts">Rice</option>
              </select>
            </div>

            <div class="form-group">
              <label>Produce Type</label>
              <input type="text" id="produceType" required />
            </div>

            <div class="form-group">
              <label>Tonnage (Kg)</label>
              <input type="number" id="tonnageKgs" step="0.1" required />
            </div>

            <div class="form-group">
              <label>Amount Due (UGX)</label>
              <input type="number" id="amountDue" required />
            </div>

            <div class="form-group">
              <label>Branch</label>
              <select id="branchName" required>
                <option value="">Select Branch</option>
                <option value="Maganjo">Maganjo</option>
                <option value="Matugga">Matugga</option>
              </select>
            </div>

            <div class="form-group">
              <label>Sales Agent Name</label>
              <input type="text" id="salesAgentName" required />
            </div>

            <div class="form-group">
              <label>Dispatch Date</label>
              <input type="date" id="dispatchDate" required />
            </div>

            <div class="form-group">
              <label>Due Date</label>
              <input type="date" id="dueDate" required />
            </div>

            <button type="submit">Record Credit Sale</button>
          </form>
        </div>
      </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/add_credit_sale.js"></script>
  </body>
</html>
