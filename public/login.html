<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Karibu Groceries Limited - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" -->
        <!-- rel="stylesheet"> -->

    <link rel="stylesheet" href="css/login.css">
</head>

<body class="slideshow-1">

    <div class="overlay"></div>

    <div class="login-container">
        <div class="logo-top">
            <img src="img/logo.png" alt="Karibu Groceries Limited Logo">
        </div>

        <div class="logo-section">
            <h1>KGL</h1>
            <h2>Karibu Groceries Limited</h2>
            <p class="subtitle">Stock & Sales Management System</p>
        </div>

        <form id="loginForm" class="login-form">
            <h3>Login to Your Account</h3>

            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required autocomplete="email" autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required
                    autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>




</body>

</html>
