
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Karibu Groceries Limited - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-container">

        <!-- Logo Section -->
        <div class="logo-section">
            <h1 style="color: #0a3d62; margin: 0; font-size: 28px;">🌾 KGL</h1>
            <h2 style="color: #0a3d62; margin: 5px 0;">Karibu Groceries Limited</h2>
            <p class="subtitle">Stock & Sales Management System</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="login-form">

            <h3>Login to Your Account</h3>

            <div id="errorMessage" class="error-message" style="display: none; margin-bottom: 15px; padding: 10px; border-radius: 4px;"></div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">Login</button>

        </form>

    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
